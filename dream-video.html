<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>昨夜梦里又回精神病院了</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#000;overflow:hidden;width:100vw;height:100vh;
  font-family:"Georgia","Noto Serif SC","STSong",serif;
}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}

.caption{
  position:fixed;bottom:clamp(32px,8vh,80px);left:50%;transform:translateX(-50%);
  z-index:10;text-align:center;max-width:620px;width:90%;pointer-events:none;
  color:rgba(222,215,205,0.9);font-size:clamp(1rem,2.4vw,1.25rem);
  line-height:1.9;letter-spacing:0.05em;
  text-shadow:0 0 40px rgba(0,0,0,0.95),0 0 80px rgba(0,0,0,0.5);
  transition:opacity 1.5s,transform 1.5s;
  opacity:0;transform:translateY(12px);
}
.caption.show{opacity:1;transform:translateY(0)}

.hint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:20;color:rgba(210,200,185,0.85);
  font-size:clamp(1rem,2vw,1.2rem);letter-spacing:0.08em;
  cursor:pointer;animation:pulse 3.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.85}}

.bar{position:fixed;bottom:0;left:0;height:1.5px;background:rgba(200,180,155,0.4);z-index:15}

.ear-hint{position:fixed;top:20px;right:24px;z-index:15;color:rgba(180,170,155,0.45);font-size:0.7rem;letter-spacing:0.06em;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="bar" id="bar"></div>
<div class="ear-hint">🎧 建议戴耳机</div>
<div class="hint" id="hint">按 空格键 开始</div>
<div class="caption" id="cap"></div>

<script>
// ═══════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let W,H;
function rs(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
rs();window.addEventListener('resize',rs);

function L(a,b,t){return a+(b-a)*t}
function C(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function S(e0,e1,x){const t=C((x-e0)/(e1-e0),0,1);return t*t*(3-2*t)}
function R(r,g,b,a){return `rgba(${r|0},${g|0},${b|0},${a})`}

// ── VHS Grain textures ──
const vhsGrain=document.createElement('canvas');vhsGrain.width=256;vhsGrain.height=256;
const vgC=vhsGrain.getContext('2d');
const vgD=vgC.createImageData(256,256);
for(let i=0;i<vgD.data.length;i+=4){
  vgD.data[i]=Math.random()*50;vgD.data[i+1]=Math.random()*45;vgD.data[i+2]=Math.random()*40;vgD.data[i+3]=35;
}
vgC.putImageData(vgD,0,0);

// Stronger colored grain for VHS look
const vhsGrain2=document.createElement('canvas');vhsGrain2.width=128;vhsGrain2.height=128;
const vg2C=vhsGrain2.getContext('2d');
const vg2D=vg2C.createImageData(128,128);
for(let i=0;i<vg2D.data.length;i+=4){
  vg2D.data[i]=Math.random()*70;vg2D.data[i+1]=Math.random()*60;vg2D.data[i+2]=Math.random()*55;vg2D.data[i+3]=20;
}
vg2C.putImageData(vg2D,0,0);

// Tracking line artifact
let trackPhase=0,trackIntensity=0;

// ── VHS Post-Processing ──
function postProcess(time){
  // 1. Film jitter — slight random offset each frame
  const jx=(Math.random()-0.5)*2.5;
  const jy=(Math.random()-0.5)*1.8;

  // 2. Tracking artifact — occasional horizontal glitch bands
  trackPhase+=0.015;
  if(Math.random()<0.02) trackIntensity=Math.random()*18+5;
  trackIntensity*=0.85;

  // 3. Snapshot current frame to temp canvas for chromatic aberration
  const snap=document.createElement('canvas');
  snap.width=W;snap.height=H;
  const sC=snap.getContext('2d');
  sC.drawImage(c,0,0,W,H);

  // 4. Clear and redraw with effects
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Chromatic aberration — RGB channels slightly offset
  ctx.globalAlpha=1;
  // Red channel slightly left
  ctx.globalCompositeOperation='lighter';
  ctx.drawImage(snap,-2+jx,jy,W,H);
  // Small color fringing via tinted copies
  ctx.globalAlpha=0.45;
  ctx.drawImage(snap,-1.5+jx,jy,W,H);
  ctx.globalAlpha=0.55;
  ctx.drawImage(snap,1+jx,0+jy,W,H);
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  // Main image centered
  ctx.drawImage(snap,jx,jy,W,H);

  // 5. Tracking line glitch
  if(trackIntensity>1){
    const ty=Math.random()*H;
    const th=Math.random()*8+2;
    ctx.globalAlpha=trackIntensity/25;
    ctx.fillStyle='#fff';ctx.fillRect(0,ty,W,th);
    ctx.fillStyle='#000';ctx.fillRect(0,ty+th,W,1);
    // Shift band slightly
    ctx.drawImage(snap,Math.random()*12-6,ty, W,th, 0,ty,W,th);
    ctx.globalAlpha=1;
  }

  // 6. VHS colored grain — heavy, analog
  ctx.globalAlpha=0.22;ctx.drawImage(vhsGrain,0,0,W,H);
  ctx.globalAlpha=0.08;ctx.drawImage(vhsGrain2,0,0,W,H);
  ctx.globalAlpha=1;

  // 7. Scanlines
  ctx.fillStyle='rgba(0,0,0,0.08)';
  for(let y=0;y<H;y+=3){ctx.fillRect(0,y,W,1);}

  // 8. Color grading — warm amber + deep green clash
  // Warm amber overlay
  const amber=ctx.createRadialGradient(W*0.35,H*0.4,10,W*0.35,H*0.4,W*0.9);
  amber.addColorStop(0,'rgba(200,140,50,0.06)');
  amber.addColorStop(0.5,'rgba(180,120,40,0.03)');
  amber.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=amber;ctx.fillRect(0,0,W,H);
  // Deep green shadows
  const greenGrad=ctx.createRadialGradient(W*0.65,H*0.6,30,W*0.65,H*0.6,W*0.85);
  greenGrad.addColorStop(0,'rgba(20,60,40,0.06)');
  greenGrad.addColorStop(0.6,'rgba(10,40,25,0.03)');
  greenGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=greenGrad;ctx.fillRect(0,0,W,H);

  // 9. Vignette — strong analog frame edge darkening
  const v=ctx.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.78);
  v.addColorStop(0,'rgba(0,0,0,0)');
  v.addColorStop(0.55,'rgba(0,0,0,0.15)');
  v.addColorStop(0.85,'rgba(0,0,0,0.5)');
  v.addColorStop(1,'rgba(0,0,0,0.75)');
  ctx.fillStyle=v;ctx.fillRect(0,0,W,H);

  // 10. Subtle film scratch — rare vertical white lines
  if(Math.random()<0.03){
    const sx=Math.random()*W;
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,Math.random()*H*0.6);ctx.stroke();
  }

  // 11. Desaturation overlay
  ctx.fillStyle='rgba(20,18,25,0.06)';ctx.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════
// AUDIO — 安溥 / 黄慧音 / Hans Zimmer
// ═══════════════════════════════════════
let AC,mg,an=[];
function initAudio(){
  if(AC) return;
  try{
    const A=window.AudioContext||window.webkitAudioContext;
    if(!A) return;
    AC=new A();mg=AC.createGain();mg.gain.value=0.5;mg.connect(AC.destination);
    // Resume if suspended (required by Chrome/Safari after user gesture)
    if(AC.state==='suspended') AC.resume();
  }catch(e){console.warn('Audio init failed:',e);AC=null}
}
function stopAll(){an.forEach(n=>{try{n.stop()}catch(e){}});an.length=0}

// 安溥 — airy, gentle, breathing
function anpuBreath(freq=220,start,dur=8){
  if(!AC) return;
  const t=AC.currentTime+start;
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='sine';o.frequency.value=freq;
  const lfo=AC.createOscillator();const lg=AC.createGain();
  lfo.frequency.value=0.25;lg.gain.value=8;
  lfo.connect(lg);lg.connect(o.frequency);lfo.start(t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.04,t+dur*0.3);
  g.gain.linearRampToValueAtTime(0.02,t+dur*0.7);g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(g);g.connect(mg);o.start(t);o.stop(t+dur);
  an.push(o,lfo);
}

// 黄慧音 — bell/chime meditation
function huangBell(freq=440,start,dur=6){
  if(!AC) return;
  const t=AC.currentTime+start;
  const o=AC.createOscillator();const g=AC.createGain();
  const f=AC.createBiquadFilter();
  o.type='sine';o.frequency.value=freq;
  f.type='bandpass';f.frequency.value=freq;f.Q.value=20;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.1,t+0.08);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(f);f.connect(g);g.connect(mg);
  o.start(t);o.stop(t+dur);an.push(o);
}

// 黄慧音 — deep drone
function huangDrone(freq=55,start,dur=20){
  if(!AC) return;
  const t=AC.currentTime+start;
  const o=AC.createOscillator();const g=AC.createGain();
  const f=AC.createBiquadFilter();
  o.type='sine';o.frequency.value=freq;
  f.type='lowpass';f.frequency.value=150;f.Q.value=2;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+3);
  g.gain.linearRampToValueAtTime(0.04,t+dur-2);g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(f);f.connect(g);g.connect(mg);
  o.start(t);o.stop(t+dur);an.push(o);
}

// Hans Zimmer — deep organ swell
function zimmerSwell(base=40,start,dur=15){
  if(!AC) return;
  const t=AC.currentTime+start;
  [1,2,3,4,6,8].forEach((h,i)=>{
    const o=AC.createOscillator();const g=AC.createGain();
    o.type='sine';o.frequency.value=base*h;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.025/(i+1),t+dur*0.45);
    g.gain.linearRampToValueAtTime(0.012/(i+1),t+dur*0.75);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.connect(g);g.connect(mg);o.start(t);o.stop(t+dur);an.push(o);
  });
}

// Heartbeat
function heartbeat(start,bpm=55,dur=12){
  if(!AC) return;
  const t=AC.currentTime+start;
  const iv=60/bpm;
  for(let i=0;i<dur/iv;i++){
    const o1=AC.createOscillator();const g1=AC.createGain();
    o1.type='sine';o1.frequency.value=35;
    g1.gain.setValueAtTime(0,t+i*iv);
    g1.gain.linearRampToValueAtTime(0.12,t+i*iv+0.04);
    g1.gain.exponentialRampToValueAtTime(0.001,t+i*iv+0.35);
    o1.connect(g1);g1.connect(mg);o1.start(t+i*iv);o1.stop(t+i*iv+0.4);an.push(o1);
  }
}

// Water texture
function waterTex(start,dur=15){
  if(!AC) return;
  const t=AC.currentTime+start;
  const bs=AC.sampleRate*2;
  const b=AC.createBuffer(1,bs,AC.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<bs;i++) d[i]=(Math.random()*2-1)*0.04;
  const s=AC.createBufferSource();s.buffer=b;s.loop=true;
  const g=AC.createGain();const f=AC.createBiquadFilter();
  f.type='bandpass';f.frequency.value=3500;f.Q.value=2;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+2);
  g.gain.linearRampToValueAtTime(0,t+dur);
  s.connect(f);f.connect(g);g.connect(mg);s.start(t);s.stop(t+dur);an.push(s);
}

// Cold drone — Twin Peaks inspired
function coldDrone(freq=45,start,dur=20){
  if(!AC) return;
  const t=AC.currentTime+start;
  const o=AC.createOscillator();const g=AC.createGain();
  const f=AC.createBiquadFilter();
  o.type='sawtooth';o.frequency.value=freq;o.detune.value=-8;
  f.type='lowpass';f.frequency.value=120;f.Q.value=5;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+4);
  g.gain.linearRampToValueAtTime(0.03,t+dur-3);g.gain.linearRampToValueAtTime(0,t+dur);
  o.connect(f);f.connect(g);g.connect(mg);o.start(t);o.stop(t+dur);an.push(o);
}

// ═══════════════════════════════════════
// SCENE DRAWING FUNCTIONS
// ═══════════════════════════════════════

// ── Scene 0: 玉佛前 ──
function drawBuddha(p,time){
  ctx.fillStyle='#040608';ctx.fillRect(0,0,W,H);

  // Deep green-amber clash
  const bgGrad=ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0,R(8,14,10,1));
  bgGrad.addColorStop(0.4,R(12,18,14,1));
  bgGrad.addColorStop(0.7,R(16,14,8,1));
  bgGrad.addColorStop(1,R(10,8,4,1));
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Warm amber light source — top right, soft
  const amber=ctx.createRadialGradient(W*0.65,H*0.2,20,W*0.5,H*0.4,W*0.8);
  amber.addColorStop(0,R(200,150,60,0.15));
  amber.addColorStop(0.3,R(180,120,40,0.06));
  amber.addColorStop(0.6,R(120,80,30,0.02));
  amber.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=amber;ctx.fillRect(0,0,W,H);

  // Green shadow — bottom left
  const green=ctx.createRadialGradient(W*0.3,H*0.7,30,W*0.35,H*0.6,W*0.7);
  green.addColorStop(0,R(20,60,40,0.12));
  green.addColorStop(0.5,R(10,40,25,0.04));
  green.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=green;ctx.fillRect(0,0,W,H);

  // Incense smoke — drifting curves
  for(let i=0;i<4;i++){
    const sx=W*0.45+i*W*0.04;
    const sy=H*0.5-i*0.05;
    ctx.strokeStyle=R(180,160,140,0.04+Math.sin(time*0.3+i)*0.02);
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx,sy);
    ctx.quadraticCurveTo(sx+Math.sin(time*0.5+i)*30,sy-60-Math.cos(time*0.4+i)*40,
      sx+Math.sin(time*0.6+i)*50,sy-120-Math.cos(time*0.5+i)*60);
    ctx.stroke();
    // Smoke widening
    ctx.lineWidth=3;ctx.globalAlpha=0.03;
    ctx.stroke();ctx.globalAlpha=1;ctx.lineWidth=1.5;
  }

  // Jade Buddha statue — left side, backlit silhouette
  const bAlpha=S(0.1,0.6,p);
  const bx=W*0.22,by=H*0.4;
  // Base/pedestal
  ctx.fillStyle=R(25,35,28,0.6*bAlpha);
  ctx.fillRect(bx-35,by+80,70,20);
  ctx.fillStyle=R(30,40,30,0.4*bAlpha);
  ctx.fillRect(bx-30,by+75,60,10);
  // Buddha body — jade silhouette
  ctx.fillStyle=R(35,55,42,0.5*bAlpha);
  ctx.beginPath();ctx.ellipse(bx,by+25,28,42,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle=R(40,60,45,0.45*bAlpha);
  ctx.beginPath();ctx.arc(bx,by-28,20,0,Math.PI*2);ctx.fill();
  // Halo behind head
  ctx.strokeStyle=R(120,180,140,0.15*bAlpha);ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(bx,by-28,30,0,Math.PI*2);ctx.stroke();
  // Usnisa (top knot)
  ctx.fillStyle=R(45,65,48,0.35*bAlpha);
  ctx.beginPath();ctx.ellipse(bx,by-44,10,6,0,0,Math.PI*2);ctx.fill();
  // Jade texture — subtle mottling
  for(let i=0;i<5;i++){
    ctx.fillStyle=R(50+Math.random()*20,70+Math.random()*20,55+Math.random()*20,0.06*bAlpha);
    ctx.beginPath();ctx.arc(bx-10+Math.random()*20,by-10+Math.random()*40,3+Math.random()*6,0,Math.PI*2);ctx.fill();
  }

  // Kneeling silhouette — right side, backlit
  const kAlpha=S(0.2,0.8,p);
  const kx=W*0.68,ky=H*0.58;
  // Body — kneeling, small
  ctx.fillStyle=R(8,10,8,0.7*kAlpha);
  ctx.beginPath();ctx.ellipse(kx,ky,14,20,0.1,0,Math.PI*2);ctx.fill();
  // Head — bowed
  ctx.fillStyle=R(6,8,6,0.65*kAlpha);
  ctx.beginPath();ctx.arc(kx-2,ky-18,8,0,Math.PI*2);ctx.fill();
  // Backlight rim light
  ctx.strokeStyle=R(200,160,60,0.12*kAlpha);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(kx-2,ky-18,9,2.8,4.5);ctx.stroke();
  ctx.beginPath();ctx.ellipse(kx,ky,15,21,0.1,2.8,4.5);ctx.stroke();
}

// ── Scene 1: 木船搁浅 ──
function drawArk(p,time){
  ctx.fillStyle='#050404';ctx.fillRect(0,0,W,H);

  // Dry earth tones
  const earthGrad=ctx.createLinearGradient(0,0,0,H);
  earthGrad.addColorStop(0,R(40,30,18,1));
  earthGrad.addColorStop(0.3,R(50,35,20,1));
  earthGrad.addColorStop(0.7,R(60,40,22,1));
  earthGrad.addColorStop(1,R(35,22,12,1));
  ctx.fillStyle=earthGrad;ctx.fillRect(0,0,W,H);

  // Thin sunlight — pale, dusty
  const sun=ctx.createRadialGradient(W*0.5,H*0.15,30,W*0.5,H*0.5,W*0.7);
  sun.addColorStop(0,R(220,200,150,0.08));
  sun.addColorStop(0.4,R(180,150,100,0.03));
  sun.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sun;ctx.fillRect(0,0,W,H);

  // Cracked ground lines
  for(let i=0;i<12;i++){
    const cx=W*0.1+Math.random()*W*0.8,cy=H*0.55+Math.random()*H*0.4;
    ctx.strokeStyle=R(80,50,25,0.35);ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.random()*40-20,cy+Math.random()*50+10);
    ctx.lineTo(cx+Math.random()*60-30,cy+Math.random()*80+20);
    ctx.stroke();
  }

  // Distant factory silhouette
  const fAlpha=S(0.1,0.5,p);
  for(let i=0;i<4;i++){
    const fx=W*0.4+i*W*0.05,fh=40+Math.random()*50;
    ctx.fillStyle=R(30,22,15,0.4*fAlpha);
    ctx.fillRect(fx-6,H*0.28-fh,12,fh);
    if(i%2===0){ctx.fillRect(fx-3,H*0.28-fh-25,6,25);}
  }
  // Smoke stack
  ctx.fillStyle=R(35,25,18,0.35*fAlpha);
  ctx.fillRect(W*0.52,H*0.18,8,50);

  // The stranded ark — center
  const aAlpha=S(0.15,0.8,p);
  const ax=W*0.5,ay=H*0.58;
  ctx.save();ctx.translate(ax,ay);

  // Shadow under boat
  ctx.fillStyle=R(20,14,8,0.3*aAlpha);
  ctx.beginPath();ctx.ellipse(0,25,90,10,0,0,Math.PI*2);ctx.fill();

  // Boat hull — weathered, peeling
  ctx.fillStyle=R(90,65,40,0.5*aAlpha);
  ctx.beginPath();ctx.moveTo(-85,18);ctx.quadraticCurveTo(-95,0,-75,-8);
  ctx.lineTo(75,-8);ctx.quadraticCurveTo(95,0,85,18);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle=R(60,40,22,0.5*aAlpha);ctx.lineWidth=1.2;ctx.stroke();

  // Peeling paint patches
  for(let i=0;i<6;i++){
    const px=-70+i*28,py=-6+Math.random()*12;
    ctx.fillStyle=R(110,85,55,0.25*aAlpha);
    ctx.beginPath();ctx.arc(px,py,5+Math.random()*8,0,Math.PI*2);ctx.fill();
  }

  // Mast
  ctx.strokeStyle=R(70,45,25,0.4*aAlpha);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(0,-55);ctx.stroke();

  // Limp sail — torn
  ctx.fillStyle=R(130,100,70,0.15*aAlpha);
  ctx.beginPath();ctx.moveTo(0,-50);ctx.quadraticCurveTo(30,-40,8,-15);
  ctx.lineTo(-2,-15);ctx.fill();
  // Tear in sail
  ctx.strokeStyle=R(160,130,100,0.08*aAlpha);ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(5,-35);ctx.lineTo(15,-30);ctx.stroke();

  ctx.restore();

  // Dust particles
  for(let i=0;i<20;i++){
    const dx=Math.random()*W,dy=Math.random()*H*0.7;
    const da=0.03+Math.sin(time+i)*0.02;
    ctx.fillStyle=R(180,150,120,da);ctx.beginPath();
    ctx.arc(dx,dy,0.8,0,Math.PI*2);ctx.fill();
  }
}

function drawMarsh(p,time){
  ctx.fillStyle='#040608';ctx.fillRect(0,0,W,H);

  // Soft marsh tones — green + pink
  const marshGrad=ctx.createLinearGradient(0,0,0,H);
  marshGrad.addColorStop(0,R(20,30,22,1));
  marshGrad.addColorStop(0.4,R(25,35,25,1));
  marshGrad.addColorStop(0.7,R(30,35,28,1));
  marshGrad.addColorStop(1,R(20,28,22,1));
  ctx.fillStyle=marshGrad;ctx.fillRect(0,0,W,H);

  // Soft lighting — gentle, relaxed
  const soft=ctx.createRadialGradient(W*0.45,H*0.4,20,W*0.5,H*0.5,W*0.75);
  soft.addColorStop(0,R(220,200,180,0.1));
  soft.addColorStop(0.4,R(180,160,140,0.04));
  soft.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=soft;ctx.fillRect(0,0,W,H);

  // Duckweed / algae layer on water
  for(let i=0;i<30;i++){
    const dx=Math.random()*W,dy=H*0.55+Math.random()*H*0.4;
    ctx.fillStyle=R(45+Math.random()*30,70+Math.random()*30,35+Math.random()*20,0.2+Math.random()*0.15);
    ctx.beginPath();ctx.arc(dx,dy,4+Math.random()*12,0,Math.PI*2);ctx.fill();
  }

  // Reeds — vertical lines, slight sway
  for(let i=0;i<8;i++){
    const rx=W*0.1+i*W*0.11,ry=H*0.6;
    const sway=Math.sin(time*0.3+i)*4;
    ctx.strokeStyle=R(60,80,40,0.25);ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx+sway,ry-80-Math.random()*40);ctx.stroke();
    // Reed head
    ctx.fillStyle=R(70,90,50,0.2);
    ctx.beginPath();ctx.ellipse(rx+sway,ry-85-Math.random()*35,3,8,0,0,Math.PI*2);ctx.fill();
  }

  // The hand holding oar — close-up, lower left
  const hAlpha=S(0.15,0.7,p);
  const hx=W*0.35,hy=H*0.5;
  // Oar shaft
  ctx.strokeStyle=R(120,90,50,0.4*hAlpha);ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(hx-60,hy-80);ctx.lineTo(hx+30,hy+30);ctx.stroke();
  // Oar blade
  ctx.fillStyle=R(140,105,55,0.35*hAlpha);
  ctx.beginPath();ctx.ellipse(hx-65,hy-85,14,5,-0.5,0,Math.PI*2);ctx.fill();
  // Hand gripping
  ctx.fillStyle=R(190,160,130,0.2*hAlpha);
  ctx.beginPath();ctx.ellipse(hx-10,hy-15,12,8,0.3,0,Math.PI*2);ctx.fill();
  // Fingers
  for(let i=0;i<4;i++){
    ctx.fillStyle=R(180,150,120,0.15*hAlpha);
    ctx.beginPath();ctx.ellipse(hx-5+i*6,hy-10,2.5,6,0.2,0,Math.PI*2);ctx.fill();
  }

  // Glass jar with peach blossoms — floating right side
  const jAlpha=S(0.3,0.85,p);
  const jx=W*0.62,jy=H*0.45;
  // Jar body
  ctx.fillStyle=R(240,225,215,0.06*jAlpha);
  ctx.fillRect(jx-30,jy-45,60,100);
  ctx.strokeStyle=R(220,180,160,0.2*jAlpha);ctx.lineWidth=1;
  ctx.strokeRect(jx-30,jy-45,60,100);
  // Rim
  ctx.fillStyle=R(200,160,140,0.18*jAlpha);
  ctx.fillRect(jx-28,jy-47,56,7);
  // Glass shine
  ctx.strokeStyle=R(255,248,240,0.1*jAlpha);ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(jx-25,jy-30);ctx.lineTo(jx-25,jy+35);ctx.stroke();
  // Branch inside
  ctx.strokeStyle=R(100,65,45,0.25*jAlpha);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(jx,jy+45);ctx.lineTo(jx-5,jy-15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(jx-5,jy-15);ctx.lineTo(jx-18,jy-30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(jx-5,jy-5);ctx.lineTo(jx+10,jy-20);ctx.stroke();
  // Peach blossoms
  const blossoms=[[jx-18,jy-30,5.5],[jx+10,jy-20,5],[jx-5,jy-15,6],[jx-8,jy-33,4]];
  blossoms.forEach(([bx,by,br])=>{
    ctx.fillStyle=R(240,190,180,0.25*jAlpha);ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=R(220,155,145,0.15*jAlpha);ctx.beginPath();ctx.arc(bx,by,br*0.45,0,Math.PI*2);ctx.fill();
  });
  // Petals slowly drifting in water
  for(let i=0;i<5;i++){
    const px=jx-15+Math.random()*30,py=jy+10+Math.sin(time*0.3+i)*15;
    ctx.fillStyle=R(235,185,175,0.15*jAlpha);ctx.beginPath();
    ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
  }

  // Brightening transition — 潮水归来
  const bright=S(0.82,1,p);
  if(bright>0.01){
    const bGrad=ctx.createRadialGradient(W*0.5,H*0.5,10,W*0.5,H*0.5,W*0.9);
    bGrad.addColorStop(0,R(255,250,240,0.15*bright));
    bGrad.addColorStop(0.4,R(240,230,210,0.06*bright));
    bGrad.addColorStop(0.7,R(200,190,170,0.02*bright));
    bGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bGrad;ctx.fillRect(0,0,W,H);

    // Tide lines rising
    for(let i=0;i<5;i++){
      const ty=H*0.3+i*H*0.1;
      ctx.strokeStyle=R(140,180,190,0.08*bright);ctx.lineWidth=0.8;
      ctx.beginPath();
      for(let x=0;x<W;x+=25){
        ctx.lineTo(x,ty+Math.sin(x*0.012+time*0.4+i)*5);
      }
      ctx.stroke();
    }
  }
}

function drawCorridor(p,time){
  // p: 0→1 through this scene
  ctx.fillStyle='#060a08';ctx.fillRect(0,0,W,H);

  // Wall
  const wallGrad=ctx.createLinearGradient(0,0,0,H);
  wallGrad.addColorStop(0,R(18,22,20,1));wallGrad.addColorStop(0.3,R(14,18,15,1));
  wallGrad.addColorStop(0.7,R(12,15,12,1));wallGrad.addColorStop(1,R(10,13,10,1));
  ctx.fillStyle=wallGrad;ctx.fillRect(0,0,W,H);

  // Ceiling lights
  for(let i=0;i<5;i++){
    const lx=W*0.15+i*W*0.175;
    const flicker=Math.sin(time*7.3+i*1.7)*0.03+0.97;
    // Light fixture
    ctx.fillStyle=R(200,215,195,0.18*flicker);
    ctx.fillRect(lx-32,H*0.04,64,4);
    // Light pool on floor
    const pool=ctx.createRadialGradient(lx,H*0.5,5,lx,H*0.55,320);
    pool.addColorStop(0,R(180,210,195,0.07*flicker));
    pool.addColorStop(0.4,R(160,190,175,0.03*flicker));
    pool.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pool;ctx.fillRect(0,H*0.3,W,H*0.5);
  }

  // Floor line
  ctx.strokeStyle=R(40,48,42,0.5);ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(0,H*0.72);ctx.lineTo(W,H*0.72);ctx.stroke();

  // Floor reflection
  const flGrad=ctx.createLinearGradient(0,H*0.72,0,H);
  flGrad.addColorStop(0,R(25,30,25,0.4));flGrad.addColorStop(1,R(15,18,15,0.8));
  ctx.fillStyle=flGrad;ctx.fillRect(0,H*0.72,W,H*0.28);

  // Door at end
  const dAlpha=S(0.1,0.6,p);

  ctx.strokeStyle=R(50,60,55,0.5*dAlpha);ctx.lineWidth=1;
  ctx.strokeRect(dx-dw/2,dy,dw,dh);
  // Light under door
  ctx.fillStyle=R(190,215,200,0.12*dAlpha);
  ctx.fillRect(dx-dw/2+5,dy+dh-3,dw-10,3);

}

function drawBathroom(p,time){

  // Cold bare bulb

function drawHiding(p,time){
  ctx.fillStyle='#030504';ctx.fillRect(0,0,W,H);

  const vx=W*0.5,vy=H*0.28;

  // Perspective corridor
  for(let i=0;i<8;i++){
    const d=i/7;
    const ww=L(700,50,d);const wh=L(H*0.55,88,d);
    const wx=vx-ww/2,wy=vy+d*165;
    const alpha=0.08+d*0.38;

    ctx.lineWidth=0.7;ctx.strokeRect(wx,wy,ww,wh);

  // Last stall
  const sw=50,sh=82,sx=vx-sw/2,sy=vy+135;
  ctx.fillStyle=R(10,13,10,0.8);ctx.fillRect(sx,sy,sw,sh);
  ctx.strokeStyle=R(50,54,50,0.5);ctx.lineWidth=1;ctx.strokeRect(sx,sy,sw,sh);

  // Curled figure

  ctx.arc(fx-8,fy-14,3.8,0,Math.PI*2);ctx.fill();

}

function drawQuiet(p,time){
  // Deep blue quiet
  ctx.fillStyle='#020408';ctx.fillRect(0,0,W,H);

  const breathe=Math.sin(time*0.4)*0.5+0.5;
  const warmGlow=ctx.createRadialGradient(W*0.5,H*0.5,20,W*0.5,H*0.5,280);

  // Curled figure - almost sleeping
  const fx=W*0.5,fy=H*0.52;
  const bodyScale=1+breathe*0.04;
  ctx.save();ctx.translate(fx,fy);ctx.scale(bodyScale,bodyScale);ctx.translate(-fx,-fy);
  ctx.fillStyle=R(200,190,182,0.1);ctx.beginPath();
  ctx.ellipse(fx,fy,13,21,0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=R(180,170,162,0.06);ctx.beginPath();
  ctx.arc(fx-2,fy-18,5.5,0,Math.PI*2);ctx.fill();

}

function drawPeopleEnter(p,time){

  const shake=Math.sin(time*13)*2.5*C(p*2.5,0,1);

function drawGirlEnters(p,time){
  // p: 0→1
  // Sub-phases
  const ph1=S(0,0.2,p);   // door opens
  const ph2=S(0.2,0.5,p);  // she approaches
  const ph3=S(0.5,0.75,p); // hand reaches
  const ph4=S(0.75,1,p);   // the touch

  ctx.fillStyle='#030406';ctx.fillRect(0,0,W,H);

  // Stall enclosure

  ctx.fillStyle=R(38,42,36,0.3);ctx.fillRect(W*0.48,sy+6,W*0.04,5);

  // Long hair
  ctx.fillStyle=R(32,27,22,0.11+ph2*0.03);
  ctx.beginPath();ctx.ellipse(vx-6,vy-13,3.5,11,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(vx-3,vy-7,3,9,0.1,0,Math.PI*2);ctx.fill();

  // ── GIRL (left) — short hair, dark tee, black bracelet ──
  if(ph1>0.01){
    const gx=sx+sw*0.25,gy=sy+sh*0.5;
    // Body
    ctx.fillStyle=R(155,150,168,0.12*ph2);ctx.beginPath();

    ctx.fillStyle=R(35,33,38,0.1*ph2);
    ctx.fillRect(gx-7,gy-5,14,12);
    // Short hair
    ctx.fillStyle=R(30,26,32,0.12*ph2);ctx.beginPath();
    ctx.arc(gx+1,gy-18,5.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=R(26,22,28,0.08*ph2);
    ctx.fillRect(gx-6,gy-21,13,4);
    // Black bracelet
    if(ph3>0.01){
      ctx.strokeStyle=R(18,15,18,0.18*ph3);ctx.lineWidth=1.3;
      ctx.beginPath();ctx.moveTo(gx-5,gy-1);ctx.lineTo(gx+3,gy+2);ctx.stroke();
    }
  }

  // ── Her hand reaching ──
  if(ph3>0.01){
    const hx=L(sx+sw*0.38,vx-13,ph3);
    const hy=L(sy+sh*0.38,vy+10,ph3);

    ctx.strokeStyle=R(175,170,180,0.12*ph3);ctx.lineWidth=2;

  // ── The touch — cold blue ──

    // Tremble
    const tr=Math.sin(time*20)*0.35*ph4;
    ctx.save();ctx.translate(0,tr);

    const wa=C((ph4-0.3)*1.5,0,1);
    for(let i=0;i<6;i++){
      const wx=W*0.5+Math.sin(i*1.3)*5,wy=sy+16+i*14;

      ctx.arc(wx,wy,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=R(215,232,245,0.12*wa);ctx.beginPath();
      ctx.arc(wx+1,wy+7,1.8,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

}

  // Arm around narrator
  ctx.strokeStyle=R(175,168,182,0.08*ff);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(fx-2,fy-5);ctx.quadraticCurveTo(fx+5,fy-10,fx+12,fy-8);ctx.stroke();

  // Water droplets — now pearlescent, beautiful
  if(p>0.4){
    const da=S(0.4,1,p);
    for(let i=0;i<15;i++){
      const dx=W*0.5+Math.sin(time*0.4+i*2.1)*W*0.25;
      const dy=H*0.35-Math.cos(time*0.3+i*1.5)*H*0.2;
      const alpha=0.08+Math.sin(time*0.7+i)*0.05;
      ctx.fillStyle=R(225,238,250,C(alpha*da,0,0.22));
      ctx.beginPath();ctx.arc(dx,dy,1.6+Math.random()*1,0,Math.PI*2);ctx.fill();
      // Pearl shimmer
      ctx.fillStyle=R(240,245,252,C(alpha*da*0.7,0,0.18));
      ctx.beginPath();ctx.arc(dx-0.5,dy-0.5,0.8,0,Math.PI*2);ctx.fill();
    }
  }

}

function drawAwakening(p,time){
  // "然后我便醒来了" -> into Green Tara light
  ctx.fillStyle='#020304';ctx.fillRect(0,0,W,H);

  // Dawn light growing
  const dawn=S(0,0.5,p);
  const dg=ctx.createRadialGradient(W*0.5,H*0.45,15,W*0.5,H*0.45,W*0.85);
  dg.addColorStop(0,R(252,248,238,0.35*dawn));
  dg.addColorStop(0.25,R(225,215,200,0.15*dawn));
  dg.addColorStop(0.5,R(160,170,190,0.06*dawn));
  dg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=dg;ctx.fillRect(0,0,W,H);

  // Two figures fading into light
  if(p<0.6){
    const fa=1-S(0.3,0.6,p);
    const fx=W*0.5,fy=H*0.5;
    ctx.fillStyle=R(230,224,215,0.1*fa);ctx.beginPath();
    ctx.ellipse(fx+8,fy,7,16,0.05,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=R(180,175,188,0.08*fa);ctx.beginPath();
    ctx.ellipse(fx-7,fy-1,7,16,-0.03,0,Math.PI*2);ctx.fill();
  }

  // Green Tara emerges
  const tara=S(0.4,0.85,p);
  // Emerald halo
  const hb=Math.sin(time*0.35)*0.3+0.7;
  ctx.strokeStyle=R(100,170,140,0.18*tara*hb);ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(W*0.5,H*0.42,W*0.16,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=R(130,195,165,0.1*tara*hb);ctx.lineWidth=0.5;
  ctx.beginPath();ctx.arc(W*0.5,H*0.42,W*0.18,0,Math.PI*2);ctx.stroke();

  // Seated form
  const tx=W*0.5,ty=H*0.48;
  ctx.fillStyle=R(110,170,148,0.25*tara);ctx.beginPath();
  ctx.ellipse(tx,ty,W*0.05,H*0.12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=R(130,185,160,0.28*tara);ctx.beginPath();
  ctx.arc(tx,ty-H*0.12,W*0.045,0,Math.PI*2);ctx.fill();
  // Right foot extended
  ctx.fillStyle=R(110,170,148,0.2*tara);ctx.beginPath();
  ctx.ellipse(tx+W*0.05,ty+H*0.09,W*0.025,H*0.018,0.3,0,Math.PI*2);ctx.fill();
  // Lotus seat
  ctx.fillStyle=R(170,210,195,0.12*tara);ctx.beginPath();
  ctx.ellipse(tx,ty+H*0.11,W*0.09,H*0.025,0,0,Math.PI*2);ctx.fill();

  // Light particles
  for(let i=0;i<10;i++){
    const px=tx+Math.sin(time*0.5+i*2.4)*W*0.13;
    const py=ty-H*0.1+Math.cos(time*0.4+i*1.8)*H*0.18;
    ctx.fillStyle=R(190,225,210,C(0.1+Math.sin(time+i)*0.08,0,0.25)*tara);
    ctx.beginPath();ctx.arc(px,py,1.5+Math.random(),0,Math.PI*2);ctx.fill();
  }

  // Final fade to warm white
  if(p>0.8){
    const ff=S(0.8,1,p);
    ctx.fillStyle=R(248,244,236,0.45*ff);ctx.fillRect(0,0,W,H);
  }

}

// ═══════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════
const cap=document.getElementById('cap');
const bar=document.getElementById('bar');
const hint=document.getElementById('hint');
let running=false,startTime=0,animId=null,lastCue=-1;

function setCue(text){
  // Remove inline styles so CSS transitions work
  cap.style.opacity='';cap.style.transform='';
  cap.classList.remove('show');
  cap.textContent=text||'';
  if(text){
    // Force reflow then trigger transition
    void cap.offsetWidth;
    cap.classList.add('show');
  }
}

function update(time){
  // Scene
  for(let i=scenes.length-1;i>=0;i--){
    if(time>=scenes[i].start){scenes[i].draw((time-scenes[i].start)/(scenes[i].end-scenes[i].start),time);break;}
  }

  // VHS post-processing
  postProcess(time);

  // Cue
  let ci=-1;
  for(let i=cues.length-1;i>=0;i--){if(time>=cues[i].t){ci=i;break;}}
  if(ci!==lastCue){lastCue=ci;setCue(ci>=0?cues[ci].text:'');}

  bar.style.width=(time/TOTAL*100)+'%';
}

function start(){
  if(running) return;
  initAudio();
  if(AC&&AC.state==='suspended') AC.resume();
  stopAll();
  musicAll();
  running=true;startTime=performance.now();lastCue=-1;
  setCue('');hint.style.display='none';
  if(!animId) animId=requestAnimationFrame(loop);
}

function loop(ts){
  if(running){
    const t=(ts-startTime)/1000;
    if(t>=TOTAL){update(TOTAL);running=false;hint.style.display='block';hint.textContent='按空格键重新播放';}
    else update(t);
  }
  animId=requestAnimationFrame(loop);
}

// Controls
hint.addEventListener('click',start);
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.key===' '){e.preventDefault();start();}});

// Init
update(0);animId=requestAnimationFrame(loop);
window.addEventListener('resize',()=>{rs();if(!running)update(0);});
